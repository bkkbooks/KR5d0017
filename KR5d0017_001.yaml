body:
  text: 無名氏注乾坤者易之門户衆卦之父母坎離匡郭運轂正輻繫辭曰乾坤其易之門耶蓋乾得乎純陽坤得乎純陰凡衆卦之陽爻皆得乎乾之陽衆卦之陰爻皆得乎坤之陰故乾坤之陰陽所以爲入衆卦之門户也在人則乾爲首而備耳目鼻口舌之顯于外者也坤爲腹而備心肝脾肺腎之在乎内者也故凡衆石之屬陽者皆乾之所爲其屬陰者則坤之所爲也其始也未有衆卦而坎則孕於坤之中離則孕於乾之中在人則腎屬坎而居乎下心屬離而居乎上及坎離一合則坎運其陽離運其陰以成六十卦人之坎男離女交媾則衆石實自此而基也故曰運轂正輻右第一章牝牡四卦以爲橐籥覆冒陰陽之道猶上御者準繩墨執銜轡正䂓矩隨軌轍處中以制外數在律曆紀月節有五六三十日也經緯奉日使兼并爲六十剛柔有表裏四卦者乾坤坎離也牝牡者陰陽之道也以言其大則窮衆卦之陰陽皆四卦而爲之覆冒以言其用則衆卦之陰陽皆四卦而爲之鼓動是其居中以制外亦猶二者準繩墨於内而䂓矩自能正於外御者執銜轡於内而軌轍自能隨於外也以其數而言則乾之九坤之六坎之七離之八實爲律曆之綱紀也以一月而言則二辰共五日而六辰共十五日故一月有六五之數也以一日而用兩卦則剛柔相爲經緯相爲表裏者實盡乎此右第二章朔旦屯直事至暮蒙當受晝夜各一卦用之依次序易自乾坤二卦之後則次之屯蒙今言旦屯暮蒙則日用兩卦可知矣若更能依屯蒙之後卦次序而推之則晝夜各一卦而一月可周六十卦也右第三章既未至晦爽終則復更始日辰爲期度動靜有早晩易卦終於既濟未濟自初一以屯蒙而推之以至於晦日之旦暮則終於既未可知矣然終則必有始故次月之初復自屯蒙而始也非特日用之有其序則屯蒙必行於子時五日共二辰則上弦行於卯時下弦行於酉時與夫十五十六則行於午時其動之亦有早晚也不可以不察右第四章春夏據内體從子到辰巳秋冬當外用自午訖戌亥陽氣自子生而上升故以春夏爲内體陰氣自午而下降故以秋冬爲外用此言十二月之火候也右第五章賞罰應春秋昏明順寒暑爻辭有仁義隨時發喜怒如是應四時五行得其理在易天道有陰陽地道有剛柔人道有仁義夫陽至於春則發生陰至於秋則肅殺人則象陽之發生而施仁以爲賞象陰之肅殺則主義以爲罰其喜怒之見於外也如此而修煉之士則體春之發生於陽氣大壯之時在一月則上弦之日也而飛金精蓋春屬木而金精則屬坎之水水能生木乃施仁之義也復體秋之肅殺於陰氣正盛之時在一月則下弦之日也而採藥蓋秋屬金而離宫之藥則屬火火能制金乃討叛之義也如是而象四時則五行豈不得其理乎右第六章天地設位而易行乎其中矣天地者乾坤之象也設位者列陰陽配合之位也易謂坎離坎離者乾坤二用二用無爻位周流行六虚往來既不定上下亦無常幽潜淪匿變化於中包囊萬物爲道紀綱坎離爲乾坤二用者蓋乾純陽也皆天德也不能以自用也故易曰天德不可爲首也而用之則在乎陰乃聰明睿智守之以愚而後羣龍爲之用故曰見羣龍無首吉無首者守愚之謂也坤純陰也兩賤不能以相使亦不能自用也故易曰利永貞而用之則在乎陽蓋自用則迷而得主則利故曰東北喪朋乃終有慶東北陽方也故乾卦言用九坤卦言用六其餘則不言用也故純陽而一陰生則離之虚中乃乾之用也純陰而一陽生則坎之剛中乃坤之用也是故六十卦中之陽爻皆乾中有陰以爲之運六十卦中之陰爻皆坤中有陽以爲之運此乾坤所以爲衆卦之父母故不在乎衆卦之列而坎離爲乾坤之用故亦幽潜淪匿而不以爻位自著夫六虚者謂衆卦之初皆具乎純坤之體而中六位皆虚也惟中六位皆虚故坎離變化於中得以運乾坤之陰陽以周流於六虚之内而後六十卦之體備矣惟其欲周六十卦故陰陽之或上或下或往或來故不可以爲典要又曷常有定體哉此坎離雖不用而包囊萬物爲道紀綱者實在乎是在人則乾爲父坤爲母父之精母之血亦坎離爲乾坤之二用也然父母皆不能以自用陽必資乎陰陰必資乎陽及坎離之相交爲用則五臟六腑百骸九竅莫不於是而生焉右第七章以無制有器用者空故推消息坎離没亡有者萬物無者一陽之氣也有者魄也無者魂也此言無者謂坎離生陰陽二物而成六十卦故曰消息所謂没亡者坎離不用也右第八章言不苟造論不虚生引驗見效校度神明推類結字原理爲證坎戊月精離己日光日月爲易剛柔相當土王四季羅絡始終青赤白黑各居一方皆禀中宫戊己之功言土旺四季者蓋五行中土無正位亦猶坎離四卦爲乾坤二用而運成六十卦也是以坎管戊離管己以居中也故自初一至初八午用十五卦以象乎春之青又自八日午至月半用十五卦以象乎夏之赤又自十六至二十三午用十五卦以象乎秋之白又自二十三午至三十日用十五卦以象乎冬之黑故曰青赤白黑皆禀乎戊己也右第九章易者象也懸象著明莫大乎日月窮神以知化陽往則陰來輻輳而輪轉出入更卷舒易有三百八十四爻據爻摘符符謂六十四卦晦至朔旦震來受符當斯之際天地媾其精日月相持雄陽播玄施雌陰化黄包混沌相交接權輿樹根基經營養鄞鄂凝神以成軀衆夫蹈以出蝡動莫不由雄陽謂坎也播玄施者謂初變爲震次爲兊以至於爲乾乾天也天色玄故龍虎經曰雄陽翠玄水雌陰謂離也化黄包者謂初變爲巽次爲艮以至於坤坤地也地色黄故龍虎經曰雌陰赭黄金右第十章於是仲尼讃鴻濛乾坤德洞虚稽古當元皇關雎建始初冠婚氣相紐元年乃芽滋昔聖人作易上經始乾坤父母之道也故易繫曰乾道成男坤道成女下經始咸恒夫婦之道也故序卦曰有男女然後有夫婦自天地而言之則乾居上而坤居下是爲不交之否自一身而觀之則離女坎男之不交是爲火水之未濟豈非獨陽不生獨陰不成而曠然洞虚者乎及其天地一交而爲泰水上火下則爲既濟豈非天地交而萬物生男女交而志通者乎故聖人序詩則以關睢爲首而夫婦之道愈正矣右第十一章聖人不虚生上觀顯天符天符有進退詘伸以應時故易統天心易與天地準非聖人莫能明之右第十二章復卦建始萌長子繼父體母因立兆基坤上消息應鍾律升降據斗樞三日出爲爽震庚受西方八日兊丁受上弦平如繩十五乾體就盛滿甲東方蟾蜍與兔魄日月氣雙明蟾蜍視卦節兔者吐生光七八道已訖十五數屈折低下降右第十三章十六轉受統巽辛見平明艮直於丙南下弦二十三坤乙三十日東北䘮其朋節盡相禪與繼體復生龍日月相會之地謂之辰故一年十二度會也而會必於朔故曰日月合璧謂之朔惟其朔旦之合璧故月魄有時而蝕日然日月皆逆行於天而日一日行一度月則一日行十三度强也月至三日而明始生則去日已僅四十度故當其日之西沈而月受日之魂如純坤之得一陽也是爲震卦而見於西方庚位之上故震管庚及至八日去日愈遠陽魂日盛是爲兊卦當日西沈而月之行已至於南方丁位之上乃上弦也故兊管丁及至十五日則日月相望而陽意滿矣故爲乾卦當日西沈而月已岀於東方甲位之上故乾管甲方其月魂之滿也及至中霄壬子之時而陰魄已生矣是爲離卦故離管壬至十六已後陰魄始見如純乾之得一陰也是爲巽卦方其魂之初生也則可自日沈而定其所管之方隅及其魄之已生也其出愈遲則月之行住尤不可以日沈而定之矣故其定之也則以日出而辨明之故十六已後其日將升而月始抵於西方辛位之上故巽管辛至于二十三日取日已近而陽魂已消其半是爲艮卦當日之升而月之行度方至于南方丙位之上故艮管丙乃下弦也古人云近一遠三謂之弦上弦則去日前行爲未遠故爲近一下弦則去日爲尤遠而反在日之後故爲遠三自二十三至于月末則陽意消盡復爲坤卦當日之升始至于東方乙位之上故坤管乙惟其陰氣既極而陽意已於晦夜子癸之時孕之矣是爲坎卦故坎管癸至于次月復受震庚之符故曰繼體復生龍蓋震爲龍故也右第十四章壬癸配甲乙乾坤括始終七八數十五九六亦相應十五數四者合三十陽氣索滅藏八卦布列曜運移不失中乾管甲而亦管壬坤管乙而亦管癸據横天甲子坎亦管癸離亦管壬何也蓋乾卦純陽陽極而一陰生是乾於陽極之時而離已生矣坤卦純陰陰極而一陽生是坤於陰極之時而坎已生矣故曰壬癸配甲乙乾坤括始終陽氣索滅藏者謂至三十日則化純坤體故無陽矣亦如月至三十日則無光矣右第十五章元精眇難覩推度效符證居則觀其象準擬其形容立表以爲範占候定吉凶發號順時令勿失爻動時上察河圖文下序地形流中稽於人心參合考三才動則循卦節靜則因彖辭乾坤用施行天地然後治可得不慎乎火候之訣最爲精妙非常情所能推測宜細推詳與彼相符以爲圖象庶有形容爲可擬也此非上察河圖文之謂乎其次則立表于地以占時候可以爲人之軌範非下序地形流之謂乎又其次方得順時以舉事無過無不及之失非中稽人心之謂乎如是則三才既定卦節無差斯與天地合德日月合明與鬼神合其吉凶矣可不慎乎右第十六章御政之首管括微密開舒布寳要道魁柄斗指十二辰統化綱紐爻象内動吉凶外起五緯錯順應時感動四七乖戾二十八宿誃離俯仰御政之首言行金丹之初須先括定微密之㫖使心下瞭然如數一二然後方隨斗所指以收衆寳次第而行之綱紐既定循爻象而動則吉凶無不應五緯即五行四時也相爲錯綜各順其理故能隨時感應四七者二十八宿布於四方爲周天三百六十之𨇠度苟前後之或失其序俯仰誃離則乖戾集可不戒哉右第十七章文昌統録詰責台輔百官有司各典所部文昌言人君發政之所台輔喻坎離百官喻六十卦右第十八章日合五行精月受六律紀五六三十度度竟復更始原始要終存亡之緒或君驕溢亢滿違道或臣邪佞行不順軌弦望盈縮乖變凶咎執法譏刺詰過貽主人君驕逸亢滿謂臨爐不能定銖兩不依法度臣邪行不順軌謂六十卦之用前後失序則適以害神室胎仙也右第十九章辰極受正優游任下明堂布政國無害道内以養己安靜虚無原本隱明内照形軀閉塞其兊築固靈株三光陸沈温養子珠視之不見近而易求運三光入内故曰陸沈辰極謂斗也人首象天正泥丸宫也受正者謂搬運坎離之龍虎而朝納於此然後得以優游任下謂運火以煉之也泥丸之前一寸爲明堂又自此而後入三田之内故國無害道而可保其長久也雖然又當明内丹以養己使安靜於虚無之境夫原本既隱然内照形軀如水生珠而崖不枯此言坎宫之鉛也至於收離宫之汞與夫龍虎以固築靈株則金藉心中五華之氣也苟非閉塞其兊則難以收之兊口也此吾身之眞氣非外氣也故曰近夫三光者日月星也右第二十章黄中漸通理潤澤達肌膚初正則終脩榦立末可持一者以掩蔽世人莫之知一者水也黄中脾也能化砂石之藥以養四肢及五藏以生枝葉故曰終脩末可持也一者水也謂水能勿妄泄亦能自内以養己但世人未曉也右第二十一章上德無爲不以察求下得爲之其用不休上閉則稱有下閉則稱無無者以奉上上有神德居此兩孔穴法金氣亦相須上德下德者謂離爲心而居上其中有玉液可爲還丹而有益於人故曰上德坎爲腎而居下其中有金液亦爲還丹而有益於人故曰下德夫欲採玉液固不假於脩爲欲採金液非假於爐竈而脩爲不可得也及其閉而塞之也玉液已閉而入於玄膺謂玄牝也則喜其有歸也金液已閉而入於尾閭關則喜其無漏也此稱有稱無之辨金液則自下而上以爲魄玉液則自上而下以爲魂故曰神德居右第二十二章知白守黑白金黑水也神明自來白者金精黑者水基水者道樞其數名一陰陽之始玄含黄芽五金之主北方河車故鉛外黑内懷金華被褐懷玉外爲狂夫玄天色也黄地色也言純乾之中陽極生陰而離已生焉離出而生巽生艮以至於坤此言含黄芽也人之受胎也本於父精遂化而生五藏故五藏之金以腎爲主存於腎則爲金飛金晶則用河車以運之也河車即氣自北方而直至泥丸也右第二十三章金爲水母母隱子胎水者金子子藏母胞眞人至妙若有若無髣髴大淵乍沈乍浮退而分布各守境隅金能生水故曰母金金在坎中故曰隱子胎坎爲腎腎雖金之子必先藏于母之胞而後有此身也雖然其初藏於母胞也非眞人之存於胞中安能若是之至妙自其妙而觀之方以爲有而塊然一物方以爲無而萬物貝焉若沈浮於大淵之中不可以常情窺也及其退而分布則五藏六腑百骸九竅莫不由此而具焉右第二十四章採之類白造之則朱煉爲表衛白裏貞居方圓徑寸混而相拘先天地生巍巍尊高人身上爲天下爲地當其未有是身也則受父之精而後能有此天地故精氣爲先也易以乾爲首坤爲腹是也方圓徑寸乃丹田也金在坎中其色白方其操之也不得乎南方之朱安能以造成金丹哉亦猶父之精必得乎母之血然後可以盡生成之義是故白居乎裏以爲貞而離爲表衛以煉於外故能相拘於方寸之中矣蓋純陰之中一陽復而爲坎然後化爲震爲兊以至於爲乾純陽之中一陰生而爲離然後化而爲巽爲艮以至於爲坤是則坎離者先天地而生故能巍巍然如是之尊高也右第二十五章旁有垣闕狀似蓬壺環匝關閉四通踟蹰守禦密固閼絶姦邪曲閣相通以戒不虞可以無思難以愁勞神氣滿室莫之能留守之者昌失之者亡動靜休息常與人俱垣闕腎部之宫也曲閣尾閭關戒不虞者防夢寐而或泄也惟能平日無邪思則可矣動之則失靜而休息則存矣右第二十六章是非歷藏法内視有所思履行步斗宿六甲以日辰陰道厭九一濁亂弄元胞食氣鳴腸胃吐正吸外邪晝夜不卧寐晦朔未嘗休身體日疲倦恍惚狀若癡百脉鼎沸馳不得清澄居累土立壇宇朝暮敬祭祠鬼物見形象夢寐感慨之心歡意喜悦自謂必延期遽以夭命死露腐其形骸舉措輒有違悖逆失樞機諸術甚衆多千條有萬緒前却違黄老曲折戾九都歷舉旁門小法使後學知所戒也右第二十七章明者省厥㫖曠然知所由勤而行之夙夜不休服食三載輕舉遠遊跨火不焦入水不濡能存能亡長樂無憂道成德就潜伏俟時太一乃召移名中洲功滿上昇膺録受圖言同契之書能用心以明之則金丹之㫖無出乎是右第二十八章火記不虚作演易以明之偃月法鼎爐白虎爲熬樞汞日爲流珠青龍與之俱舉東以合西魂魄自相拘上弦兊數八下弦艮亦八兩弦合其精乾坤體乃成二八應一斤易道正不傾銖有三百八十四亦應卦爻之數上弦鉛八兩下弦汞八兩一兩二十四銖合十六兩言之有三百八十四銖應六十四卦三百八十四爻也故曰乾坤體乃成白虎者坎中之銀也非假偃月爐以煎熬之終莫能得是寳也謂之樞者既得是寳則欲其自曲閣之道以運之使至泥丸而後止其次則離爲日流珠自玉池而出而青龍亦與之同塗而至苟能以汞龍自玄牝門而入則龍與虎合故曰舉東以合西也虎爲魄龍爲魂則自相拘於爐鼎之内矣右第二十九章金入於猛火色不奪精光自開闢以來日月不虧明金不失其重日月形如常金本從月生朔旦受日符金返歸其母月晦日相包隱藏其匡郭沈淪於洞虚金復其故性威光鼎乃熺金即坎中液也得離火以煉之愈堅而愈瑩日即離也月即坎也坎離不以金火既施於用而遂失其明而金亦常不失其重者生生而不窮也日月之形常如是者其源本至堅固也雖然惟金火施爲金丹之用則可以如是苟爲不然則黄庭經所謂葉去樹枯失青青氣亡液漏非已形者又不可與此同日語也經曰初正則終脩榦立末可持此之謂也大抵金常生於坎亦隨日魂之消長而爲盛衰也故朔旦受日符則愈生而愈盛自陰符生而至於晦則月魄化爲坤矣故金返歸其母乃坤之土爲金之母也故雖然陰極則陽生故月於晦夜已包乎日之魂如坎之孕于坤中也但其明未著於外而特隱藏於匡郭之中而沈淪於洞虚之内也然當此之時金丹得以復其故性而其明愈熾矣右第三十章子午數合三戊己號稱五三五既諧和八石正綱紀呼吸相貪欲佇思爲夫婦黄土金之父流珠水之母水以土爲鬼土鎭水不起朱雀爲火精執平調勝負水盛火消滅俱死歸厚土三性既合會本性共宗祖坎爲水一數也離爲火二數也合之而爲三矣坎管戊而離管己戊已屬土五數也故爲三五二者夫婦之義故和諧八石者黄庭經以爲八素瓊是也謂自初八而至十五八日所採之丹資也二者相貪爲夫婦必須呼吸以求之蓋出日則呼入月則吸黄土脾液也故能生金肺液也流珠謂太陽流珠亦肺液也故能生坎水然坎水之爲物當陰符一至則陽氣索滅藏體魄化爲坤坤屬土故水爲之鎭而微弱不振矣非得火精而爲之調和安能以返其魂哉惟當陰盛火消之餘故此水終爲土所制而無生意矣然謂之水盛而不言陰盛者蓋自下弦而至三十日以時則屬乎冬以方則象乎北故曰水盛三性共祖宗者蓋人之始受胎也以父精爲主而化成五藏故五藏之五行皆宗於水也右第三十一章巨勝尚延年胡麻也還丹可入口金性不敗朽故爲萬物寳術士服食之壽命得長久土遊於四季守界定䂓矩金砂入五内霧散若風雨熏蒸達四肢顔色恱澤好髮白皆變黑齒落生舊所老翁復丁壯耆嫗成姹女改形免世厄號之曰眞人坎中之金制爲還丹終不敗朽故萬物之中最爲寳也土遊四季者謂坎離二卦管戊己而布六十卦於三十日之内分爲四時故一月奪一年之氣候坎金離砂自入爐鼎之外則用之以養内丹其金砂之入五藏不啻如雲霧之散如風雨之潤故能熏蒸四肢以反老成童者豈不有本於此哉右第三十二章胡粉投火中色壞還爲鉛冰雪得温湯解釋成太玄金以砂爲主禀和於水銀變化由其眞終始自相因欲作服食仙宜以同類者植禾當以黍覆雞用其子以類輔自然物成易陶冶魚目豈爲珠蓬蒿不成檟類同者相從事乖不成寳是以燕雀不生鳳狐兔不乳馬水流不炎上火動不潤下胡粉乃以鉛爲之今投於火而復爲鉛冰雪自水而結之投於温湯亦化爲水是猶金丹亦藉砂和水銀爲之及火滅而復其本性以見物之有本而終始不能以自壞也修煉之士其可外坎離而别用其心也哉右第三十三章世間多學士高妙負良才邂逅不遭遇耗火亡貨財據按依文說妄以意爲之端緒無因縁度量失操持擣冶𦍑石膽雲母及礜磁硫黄燒豫章泥澒相煉飛鼓下五石銅以之爲輔樞雜性不同類安肯合體居千舉必萬敗欲黠反成癡僥倖訖不遇聖人獨知之稚年至白首中道生狐疑背道守迷路出正入邪蹊管窺不廣見難以揆方來智不足以明是理切莫妄意以有爲妄意而爲之反爲識者之見哂右第三十四章若夫至聖不過伏羲始畫八卦效法天地文王帝之宗結體演爻辭夫子庶聖雄十翼以輔之三君天所挺迭興更過時優劣有步驟功德不相殊制作有所踵推度審分銖有形易忖量無兆難慮謀作事令可法爲世定詩書素無前識資因師覺悟之皓若褰帷帳瞋目登高臺易書之作乃成於三聖之手豈易明哉況金丹之㫖有體乎易其微妙隱奥尤過乎是右第三十五章火記六百篇所趣等不殊文字鄭重說世人不熟思尋度其源流幽明本共居竊爲賢者談曷敢輕爲書若遂結舌瘖絶道獲罪誅寫情著竹帛又恐泄天符猶豫增歎息俛仰綴斯愚陶冶有法度未忍悉陳敷略述其綱紀枝條見扶踈六百篇者蓋一年除二月八月息火而一月每用六十卦十箇月總有六百卦也幽明幽謂天地之道明謂人也右第三十六章以金爲隄防水入乃優游金計十有五水數亦如之臨爐定銖兩五分水有餘二者以爲眞金重如本初其三遂不入火二與之俱三物相合受變化狀若神下有太陽氣伏蒸須臾間先液而後凝號曰黄轝焉歲月將欲訖毁性傷壽年形體爲灰土狀若明䆫塵十五者謂十分取其五也乃自初一至十五日則自上弦之日採金也故下曰水五分水乃玉池神水也亦然其三不入者乃一日作四分分也金水皆取一分而餘二十三日不入也火二者陰陽二叚加減火也金即坎中之陽水即離中之陰乃玉池清水也歲月將欲訖者在十二月則坤卦之訖在亥月也在一月則訖于坤乙三十日也在一日則訖于亥時也火之陽魂皆於此而滅故曰毁性一日奪一小年一月奪一中年十二月奪一大年皆至於年終則傷其明也惟其毁傷如是則月之形體有類乎灰土而狀亦何異於明䆫塵哉右第三十七章擣治並合之持入赤色門固塞其際會務今致完堅炎火張於下晝夜聲正勤始文使可修終竟武乃陳候視加謹慎審察調寒温周旋十二節節盡更須親氣索命將絶休死亡魄魂色轉更爲紫赫然成還丹粉提以一丸刀圭最爲神擣治并合之言衆藥皆聚也赤色門謂鼎也固塞完堅勿令有漏然後發火以煉之始文終武用審寒温如至火度一周則氣索火絶魂消魄復而丹已成矣非神而何右第三十八章推演五行數較約而不繁舉水以激火奄然滅光明日月相激薄常在晦朔間水盛坎侵陽火衰離晝昏陰陽相飲食交感道自然月本無明藉日以爲明惟月至晦則變純坤體矣而坎陽已孕于中故常當晦朔之交而月或侵陽故有舉水激火之說坎侵陽離晝昏乃月食日也此亦交感自然之謂也右第三十九章名者以定情字者縁性言金來歸性初乃得稱還丹吾不敢虚說倣傚聖人文古記題龍虎黄帝美金華淮南煉秋石王陽加黄芽賢者能持行不肖母與俱古今道猶一對談吐所謀學者加勉力留念深思惟至要言甚露昭昭不我欺名者有實之可名也字則表而出之又涉於無名也有者魄也其情也無者魂也其性也惟金丹至火滅乃得復其性而成丹矣雖然金丹之㫖亦須留心精審則厥㫖自明非有隱也周易参同契注卷上
