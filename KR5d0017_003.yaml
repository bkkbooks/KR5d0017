front:
  text: 周易參同契注卷下映十
  hash: sha256:36421739b80798b8fcd06b207c72dd98d3b7bd55189fe6c00d29248a12c170d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0017_HFL_003-001a, image: hfl/0622/0622-098.png}
body:
  text: 無名氏注惟昔聖賢懷玄抱真服煉九鼎化迹隱淪含精養神通德三光津液腠理筋骨致堅衆邪辟除正氣常存纍積長久變形而仙憂憫後生好道之倫隨傍風采指畫古文著為圖籍開示後昆露見枝條隱藏本根托號諸石覆冒衆文學者得之韞櫝終身子繼父業孫踵祖先傳世迷惑竟無見聞遂使宦者不仕農夫失耘商人棄貨志士家貧吾甚傷之定録此文字約易思事省不繁披列其條核實可觀分兩有數因而相循故為亂辭孔竅其門智者審思用意參焉昔聖賢服煉九鼎含精養神與三光合其德故能津液充於腠理之間使筋骨堅致正氣常存而為仙矣但文籍之著以示後人托號諸石其義頗深隱而難明故後學終無所見不得其門而入今魏公著此使知鉛汞之分兩有數火候之相循不亂學者更宜審思焉右第七十九章法象莫大乎天地兮玄溝數萬里河鼓臨星紀兮人民皆驚駭晷影妄前却兮九年被凶咎皇上覽視之兮王者退自改關楗有低昂兮害氣逐奔走江淮之枯竭兮水流注于海天地之雌雄兮徘徊子與午寅申陰陽祖兮出入復終始循斗而招搖兮執𢖍定元紀天地之間有玄溝者乃黃河之水天上來經流于北方者也在人則北方河車實似之河鼓之星在河邊也在人則坎男也星紀北斗之分野也在人則自北方河車而直上以達泥丸之比也人民譬則一身之內也在人欲飛金晶則必震動于內故曰驚駭至如晷影前却者謂坎為月坎中之陽則為月之晷影前却者却之而不使前謂妄泄也如水之妄行故堯有九年之水而凶咎是作皇上即上清真人知其不可故王者當退而改過王者心神也關閉之道不可不謹其或有低昂而不定則邪氣得乘而害之矣江淮者南方之水道也在人則為離中之陰自玉池而出之比也其所以枯竭者則其水流注於海而不知蔭注之道也夫天地之一雌一雄不出乎子坎午離之徘徊而飛翔也寅者火之所由生亦火之所聚乃易所謂艮之成終而成始者也申者水之所由生亦水之所聚乃易所謂致役乎坤又曰坤作成物者也其可不循斗之所指以定其用哉右第八十章升熬於甑山兮炎火張設下白虎唱導前兮蒼液和於後朱雀翺翔戲兮飛揚色五彩遭遇網羅施兮壓之不得舉嗷嗷聲甚悲兮嬰兒之慕母顚倒就湯鑊兮摧折傷毛羽刻漏未過半兮魚鱗狎鬛起五色象炫耀兮變化無常主潏潏鼎沸馳兮暴湧不休止接連重疊纍兮犬牙相錯距形如仲冬冰兮闌干吐鍾乳崔嵬而雜厠兮交積相支拄熬鼎也甑山竈也白虎肺液也蒼液肝龍也朱雀乃心吐五華之氣也故有五彩而屬火焉火得坎水而制之如朱雀之遇羅網故火只得與蒼液之母相戀而在於鼎中刻漏未過半者子時也子時初施微火以煉之故其波如魚鱗然狎鬛而起其曰無常主者謂火氣日增故變化無定論極而至於武火則暴湧矣連疊積纍如犬牙相錯如鍾乳闌干以至雜厠而相拄者又前後不已之所形容也右第八十一章陰陽得其配兮淡泊而相守青龍處房六兮春華震東卯白虎在昴七兮秋芒兊西酉朱雀在張二兮正陽雜南午三者俱來朝兮家屬為親侣本之但二物兮末而為三五三五并與一兮都集歸二所治之如上科兮日數亦取甫卯東方震卦房宿之所居也其時屬春其物華在人為肝為青龍謂之六者六水之成數也言當上弦之後大壯之卦卯位也則飛坎宫之水是也酉西方兊卦昴宿之所居也其時屬秋其物芒在人為肺為白虎謂之七者七火之成數也言當下弦之內觀卦酉位也則採離宫之火是也午南方也張星之分野也謂之二者地二生火也陽氣於此乎極日魂於此乎滿火氣至此而盛故曰正陽夫六者鉛也七者汞也二者火也三者常相親為一則丹成矣火虛物也其實鉛汞二物其終也東三南二為五也西四北一為五也中宫脾土亦五也故為三五皆歸於鼎併為一也都集歸二所者玄牝尾閭也上科者入鼎之謂也以日數而行火尤不可以不謹右第八十二章先白而後黃兮赤黑達表裏名曰第一鼎兮食如大黍米自然之所為兮非有邪偽道若山澤氣相蒸兮興雲而為雨泥竭遂成塵兮火滅化為土若糵染為黃兮似藍成緑組皮革煮成膠兮麴糵化為酒同類易施功兮非種難為巧惟斯之妙術兮審諦不誑語傳於億世後兮昭然自可考焕若星經漢兮昺如水宗海思之務令熟兮反覆視上下千周燦彬彬兮萬遍將可覩明神自告人兮心靈乍自悟探端索其緒兮必得其門户天道無適莫兮常傳與賢者肺屬金白也脾屬土黃也蓋肺液自衝廬而下脾液自黃野而升此二者常相會合赤心氣也黑腎氣也此二者亦常相為表裏四者俱會於泥丸宫故為第一鼎及其成丹則一日大如黍米以入丹田之內非妄語也實天地自然之道耳豈不如山澤通氣而能興雲致雨乎火盛則泥竭化而為塵及其火滅復歸于土此乃陽魂初加於坤為震至十五日遂無坤矣及陰符浸盛則坤體復故是也其所以翻來覆去如糵則為黃藍則成緑革煮為膠糵化為酒皆其所自然而然非有以使之也右第八十三章補塞遺脫參同契者敷陳梗槩不能純一泛濫而説纖微未備闊略髣佛今更撰録補塞遺脫潤色幽深鉤援相逮旨意等齊所趣不悖故復作此命五相類則大易之情性盡矣五位相得而各有合乙浮石丁文火己藥物辛世銀癸真鉛三木二火五土四金一水甲沈石丙武火戊藥物庚世金壬真汞十干起於甲乙終於壬癸然天三生木故甲乙得三數地二生火故丙丁得二數天五生土故戊己得五數地四生金故庚辛得四數天一生水故壬癸得一數然甲丙戊庚壬陽干也乙丁已辛癸陰干也陰則隱而未見陽則見于外者也五行之藏於五藏之內者則皆以陰位配之五行之發于五藏之外者則皆以陽干配之乙當為沈甲當為浮恐字誤也然五藏之寶龍虎經以為七十二石是皆以石言之也又曰五金又皆以金言之也或日到頭不出於神水是皆以水言也又曰中和流汞情是又皆以鉛汞言也今以金銀而配庚辛以火而配丙丁故不得不以石配甲乙以鉛汞配壬癸也夫謂之各有合者乃金能生水而坎中所生復以金言之乃五行顚倒術也故水與金合木能生火而離中所生亦以木言之亦五行顚倒術也故木與火合夫丙丁既令以火言之離宫之汞乃寄於壬蓋壬屬離之所宫也戊己總以藥物言之蓋坎管戊而離管己又皆藥物之所由而生也右第八十四章大易情性各如其度黃老用究較而可御爐火之事真有所據三道由一俱出徑路金木火三道俱出徑三道者即木三火二合為五數一道也金四水一合為五數二道也脾液屬土五數也是謂之道由一者皆歸於泥丸也右第八十五章枝莖華葉果實垂布正在根株不失其素誠心所言審而不誤五藏譬則樹也枝莖華葉果實皆其所生也然此數者之如是正賴於根株之不失其素而先有以養之於內也故畢法必欲先養內丹而後飛金晶以煉外丹者此也右第八十六章象彼仲冬節竹木皆摧傷佐陽詰商旅人君深自藏象時順節令閉口不用談天道甚浩廣太玄無形容虛寂不可睹匡郭以消亡謬誤失事緒言還自敗傷别序斯四象以曉後生盲當仲冬之時萬物皆歸根復命故枝葉皆摧傷是以人君順時令而至日閉關商旅不行后不省方者欲其歸藏也修煉之士當知以身為樹以五藏為根而五藏所生之寶為華葉果實也及華葉摧落之餘必收藏以糞其根株也乃臨爐定銖兩之外餘則收之如二十二篇之金砂入五內霧散若風雨是也右第八十七章會稽鄙夫幽谷朽生挾懷朴素不樂歡榮栖遲僻陋忽略利名執守恬淡希時安平宴然間居乃撰斯文歌敘大易三聖遺言察其旨趣一統共倫三聖遺言上而在天下而在地中而在人無一不包故曰易與天地準聖賢達而在上則用以治國平天下窮而在下則用以齊家修身又翛然出乎塵俗之表用以修性或用以長生初未始有二道也右第八十八章務在順理宣耀精神神化流通四海和平表以為曆萬世可循序以御政行之不繁引內養性黃老自然含德之厚歸根返元近在我心不離己身抱一母舍可以長存配以服食雄雌設陳挺除武都八石棄捐修煉之士惟能順天地之常經以行之則精神無不宣耀神化流通欲其不和平也不可得已陰陽家推以為曆以授民時而萬世不易黃老引之以養性故知吾身之寶所蓄為至厚所生為無窮於其華葉果實之成熟者象物之歸根返元抱一而行未嘗或舍又使之雌雄相配以盡生成之義使修煉之士果能知此則武都之八石何用哉右第八十九章審用成物世俗所珍羅列三條枝莖相連同出異名皆由一門非徒纍句諧偶斯文殆有其真礫硌可觀使豫敷偽却被贅愆命參同契微覽其端辭寡意大後嗣宜遵委時去害依托丘山循遊寥廓與鬼為鄰化形而仙淪寂無聲百世一下遨遊人間陳敷羽翮東西南傾陽遭厄際水旱隔并柯葉萎黃失其華榮吉人相乘負安穩可長生成物者即物之成熟而可用者也世俗果能參味乎此瞭然心目之間吾知其必寶此以為無價之珍雖世俗之所貴者不足以動其心矣三條即三五也其名雖異不出乎吾身之內由一門者皆自泥丸而成就也然一修此之法尤當知全身遠害之道或委時而去以依托乎丘山之勢或循遊寥廓之表而與鬼為鄰皆避世也不然則恐如物之忽遭水旱朽葉或至於萎黃而失其華榮者矣為是道者可不擇吉人而與之相處者乎右第九十章鼎器歌本在補遺之前今存于後圓三五周圓一尺五寸中虛五寸名太一爐圓天方地狀若蓬壺寸一分厚一寸一分口四八唇卧仰折周圍三尺二寸明心橫一尺兩寸唇高唇環匝二寸長尺二連身長尺二上水入鼎八十厚薄勻厚一寸一分腹齊三身腹底通直上中下等坐垂溫鼎懸於竈不著地陰在上水入陽下奔下火首尾武巳陽子尾午陰亥首武火也中間文巳午兩間文火始七十終三旬二百六善調勻合周天三百六十數陰火白大白火數遇陰金得用故多白少赤黃牙鉛鉛乃牙母黃牙生於鉛兩七聚青龍房白虎昴輔翼人青龍白虎各七宿之氣贍理腦定升玄子處中神水金母養育銀水真子溫養子珠也得安存去來遊不出門漸成大情性純姹女嬰兒得母安養只在鼎內却歸一還本原始以水母為丹基水母復生真水銀善愛敬如君臣至一周甚辛勤密防護莫迷昏途路遠復幽玄若達此會乾坤刀圭霑淨魄魂得長生居仙村樂道者尋其根審五行定銖分諦思之不須論深藏守莫傳文御白鶴兮駕龍鱗遊太虛兮謁仙君録天圖兮號真人鼎之制度皆以人之左手中指中一寸以為度也然此鼎器之造其所象者頗推未合留之以俟明者其用火之數則曰始七十終三旬此特言一月之火也魏公之意則以為自一十息以至三十息皆不足以為火遂從初一日以四十息為始初二日則五十息初三日則六十息尤以為未也何者蓋月魂至三日方生明蓋微陽也故六十息亦未足以火言之至於二十八二十九日三十日陰氣浸盛亦只自六十息五十息退而至四十息故曰終三旬始七十者言自初四日一日之內而加行七十息方可以言火也自初四而往一日每增十息至十五日共成增一百八十息矣又自十六日以百八十息而退至月末合成二百六十之數故曰二百六又以七十與三旬而湊之以法周天三百六十之數此魏公之意也陽生子為首至巳為尾陰生午為首至亥為尾此言首尾武者巳午之間也中間者子亥之間也陰離宫也太白言離中液也黃牙鉛坎中液也兩七者黃庭經專言之七日蓋自八日晚而至十五為七日半也自十六而至二十三午亦七日半也故總以七日言之也贍理腦者補泥丸也升玄者自北方河車而升也子者指修煉之士言之也不出門者皆在乎吾身之內也三田漸滿謂之成火歸一還原者成金丹也一周乃一年三壇火候周也須防護恐其漏失直至九周然後為大成途路豈不遠哉易以乾坤為體坎離為運始以震巽終以艮兊而乾坤則包括乎上下卦畫成三象三才也重而為六順六氣也爻位以五備五行也揆五以六明往復也此兼三才而兩之義也此十日十二辰之所由以行也上經首乾坤終坎離下經首咸恆終既濟未濟分以九宫序以反對乾坤二畫而六十四卦之爻莫不由之坎離乃陰陽中氣其相次則倒正不變而震艮巽兊得氣之偏相次則皆以全體相反是皆陰陽循環奇耦相參虛實相求剛柔相推之理天地四時之運行人身血氣之流轉一體之義備見於斯夫物生而後有象象而後有滋滋而後有數滋蔓也衍也繁衍之大其數五十故八骸九竅五藏六府手指足指合以二腎而總有五十焉其一不用者心也太極之位是也至于揲蓍則分二象兩挂一象三揲之以四象四時歸奇於扐以象閏五歲再閏故再扐而後挂天數五奇也凡虛而運者是也意氣志慧智也地數五耦也凡實而有者是也四肢一體也天數二十有五九竅五藏六府五官是也地戴三十手足指二十八骸二腎是也凡五十有五此所以成變化而行鬼神也聚絪緼而為精氣即噓吸而為陰陽有所運為為無不遂是變化以之而成智愚本於一性善惡由乎一念有所思慮慮無不至是鬼神以之而行此即一陰一陽之謂道陰陽不測之謂神乎其運為變化與天地均矣乾之策二百一十有六筋脈之數也坤之策百四十有四齒牙骨節之戴也凡三百有六十合大小筋脈骨節之數而成一身合三百六十日而成一歲夫子曰當期者猶有未養焉爾周天三百六十五度四分度之一三百有六旬有六日定四時成歲今言三百六十者是虛其六以揆之也即大衍除五與一之義漢儒以三百六十日與三百八十四爻而二十四爻無位於是有六日七分之説又除坎離震兊四正而為二十四氣之説是殆未之思也夫子以乾坤二策散而為三百六十日則乾坤十二爻已無其位凡在卦者無非乾坤也六旬有六日與月之大小減出六日雖曰盈朔而虛以待用又不可除是十有二日而十有二爻當之矣積以為閏其用豈有窮哉是理也常周流乎六虛之中惟六虛則能運之總而言之五十有五大衍之數惟曰五十者實衍所生惟有五十蓋五官之運既已為慮一心之私又置不用則四十有九之數全契乎天理之正如是則吾身非人也天也以吾身之天而契乎上天之天其氣數之推移一與天同以之修身則能窮神知化德之盛也以之卜筮則吉凶悔吝無不先知以之治國平天下則周官三百六十屬日成月要有不可紊夫子謂有聖人之道四焉者無不在也至于二篇之策萬有一千五百二十當萬物之數即吾身毫髮毛竅之謂而天下萬物之數備之日有十二辰總一年之辰則四千五百二十而二篇之策又以當之矣子華子曰上決而成天下決而成地既已決矣命之曰中決必有所合也命之曰和中玄和同萬物化生夫是之謂三三六六四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣推而衍之先天之數是也故道以之而顯德行以之而神可以酬酢乎世變可以祐助乎神明皆本於天一地二天三地四天五地六天七地八天九地十之數麻衣所謂天一生水坎之氣孕於乾金此皆言其成象必待天一與地六合而成水乾坎合而水成於金凡此皆言其成形夫以五行生成之數雖兒童亦能成誦要其義實雖老壯亦不知著落即成變化行鬼神之意麻衣知之矣故夫子曰知變化之道者其知神之所為乎又曰易無思也無為也寂然不動感而遂通天下之故聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往古之聰明睿知神武而不殺者夫故又曰法象莫大乎天地變通莫大乎四時懸象著明莫大乎日月崇高莫大乎富貴無非以是而推之也故又曰三天兩地而倚數試以人之手足指而驗之手指之節則兩地而三天足指之節則三天而兩地手足指之各具其五是又五數之所自見也乾之文言曰大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎大有一卦惟五爻為陰是亦虛五之意而上九之天爻則有曰自天祐之吉無不利天也人也一也合而言之道也故為之説曰易由乾坤而至坎離由坎離而至震艮巽兊則天地之體備而易道彰由天地而陰陽由陰陽而精氣則人性成而吾身立是知八卦九章即吾身之八骸九竅五運六氣即吾身之五藏六府象數爻策無一事之不備精神魂魄無一物之不有一氣周流陰陽闔闢大易之道端在是矣周易參同契注卷下
