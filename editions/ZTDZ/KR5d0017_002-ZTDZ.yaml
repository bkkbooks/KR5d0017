body:
  text: 無名氏注乾剛坤柔配合相包陽禀陰受雄雌相須須以造化精氣乃舒坎離冠首光耀垂敷玄冥難測不可畫圖聖人揆度參序元基四者混沌俓入虚無六十卦周張布爲輿龍馬就駕明君御時和則隨從路平不邪邪道險阻傾危國家自初一至十五日乃乾包坤自十六至三十日乃坤包乾月之爲物其初徒有其質而受陽光然後明焉元基者坎離也四者添乾坤也入虚謂不用輿者載六十卦而行也君即心也右第四十一章君子居其室出其言善則千里之外應之謂萬乗之主處九重之室發號出令順陰陽節藏器俟時勿違卦月屯以子申蒙用寅戌餘六十卦各自有日發號岀令順陰陽節言採取丹藥并火候也自六十卦而言之一日當用兩卦自發火而言之一日即朝暮用兩時也故但以屯蒙言之乃乾坤後之初卦也但行之自有進退耳故用時前後不同也且如半夜子時一陽之生也當體一陽而用火丑時二陽生則體二陽而用火以至巳時則當用六數火也一數即三氣象一陽爻也二數即三度行二氣象二陽爻也以至六數則三度行六數象六陽全也乃有八變而成卦之道也反陰符一生於午則退一數而行五數火退至于亥則六陰全而無火矣其曰屯用子申者乃指屯卦而言之也蓋上坎下震爲屯卦震卦則初起庚子坎卦則次起戊申也又曰蒙用寅戌者亦指蒙卦言之也蓋上艮下坎爲蒙卦坎初起戊寅而艮次起丙戌是也以是見一卦之各有朝暮也直日卦而言之則六十卦記於十二時之中其用則各有先後但一日無出兩時而行火故總以屯蒙言之右第四十二章聊陳兩象未能究悉立義設刑當仁施德逆之者凶順之者吉按歷法令至誠尃密謹候日辰審察消息纖芥不正悔吝爲賊自初一至十五日施明於月故曰當仁自十六至三十日月魄漸以掩明故曰設刑右第四十三章二至改度乖錯委曲隆冬大暑盛夏霜雪二分縱横不應漏刻風雨不節水旱相伐蝗蟲湧沸羣異旁出天見其恠山崩地裂孝子用心感動皇極近出己口遠流殊域或以招禍或以致福或興太平或造兵革四者之來由乎胷臆冬至象子時夏至象午時春分卯時秋分酉時冬至一陽生則行一數火至六陽極則行六數火夏至一陰生則減一數火只行五數至六陰極則火數減滅且以冬至之月論之一月只行一數火皆於子時行之十二月皆然如月火自初一至初三早皆以子時行之自初三晩至初五皆以丑亥時行之自初六至初八早皆以寅戌時行之自初八晚至初十皆以卯酉時行之自十一至十三早皆以辰申時行之自十三晩至十五皆以巳未時行之自十六至十八早皆以午時行之自十八晚至二十皆以巳未時行之自二十一至二十三早皆以辰申時行之自二十三晩至二十五皆以卯酉時行之自二十六至二十八早皆以寅戌時行之自二十八至三十日皆以丑亥時行之此第五篇曰用之有早晩是也至於十二月二陽生所行二數火亦然由是而觀則自一陽至六陽可默而知矣右第四十四章動靜有常奉其繩墨四時順宜與氣相得剛柔斷矣不相涉入五行守界不妄盈縮易行周流屈伸反復與氣相得者如子時一陽生即可行一數火也雖月時日三者相併亦可徐徐而行之不可連發也如欲遽行丑時寅時之火適所以爲害也何者蓋二時無二陽三陽以相應故也此所以貴乎與氣相得右第四十五章晦朔之間合符行中混沌鴻濛牝牡相從滋液潤澤施化流通天地神明不可度量利用安身隱形而藏始於東北箕斗之郷旋而右轉嘔輪吐萌潜潭見蒙發散精光自朔至晦火數皆當合符不可有過不及之患惟於上弦以至下弦皆混沌之際牝牡於此而相從坎離之滋液於此而流通宜於丑寅之時乃箕斗之度也宜採取以應之右轉者逆行也嘔輪月華也吐萌日華也潜潭坎離之宫也右第四十六章昴畢之上震出爲徵陽氣造端初九潜龍陽以三立陰以八通故三日震動八日兊行九二見龍和平有明三五德就乾體乃成九三夕惕虧折神符盛衰漸革終還其初巽繼其統固濟操持九四或躍進退道危艮主止進不得逾時二十三日典守弦期九五飛龍天位加喜六五坤承結括終始韞養衆子世爲類母上九亢龍戰德于野用九翩翩爲道䂓矩陽數已訖訖則復起推情合性轉而相與昴畢之上庚方也一陽始生於卦爲震於爻爲初九三日哉生明初八爲上弦二陽已盛於卦爲兊於爻爲九二十五日三陽滿於卦爲乾於爻爲九三十六後一陰生於卦爲巽以純乾言之則於爻爲九四下弦爲艮卦謂之不得逾時者言採取銖兩不可過也以純乾言之則爲九五自二十三至三十日坤卦也故以坤承言之然以六五言者蓋陰符皆以坤爲主故以六五言之在純乾爲上九陽消已盡陰極復生故以用九終之右第四十七章循據璿璣升降上下周流六爻難可察覩故無常位爲易宗祖璿機正天文之器也陽氣生則自下而上陰氣降則自上而下周流六爻互消長於六爻之内以成六十卦不可爲典要此剛柔二者所以爲易之宗祖也右第四十八章朔旦爲復陽氣始通出入無疾立表微剛黄鍾建子兆乃滋彰播施柔暖黎烝得常右第四十九章臨爐施條開路正光光耀漸進日以益長丑之大吕結正低昂右第五十章仰以成泰剛柔並隆陰陽交接小往大來輻輳於寅運而趍時右第五十一章漸歷大壯俠列卯門榆莢墮落還歸本根刑德相負晝夜始分右第五十二章夬陰已退陽升而前洗濯羽翮振索宿塵右第五十三章乾健盛明廣被四鄰陽終於巳中而相干右第五十四章姤始紀序履霜最先井底寒泉午爲蕤賔賔服於陰陰爲主人右第五十五章遯去世位收歛其精懷德俟時栖遲昧冥右第五十六章否塞不通萌者不生陰伸陽屈没陽姓名右第五十七章觀其權量察仲秋情任畜微稚老枯復榮薺麥牙糵因冒以生右第五十八章剥爛肢體消滅其形化氣既竭亡失至神右第五十九章道窮則反歸乎坤元恒順地理承天布宣此言十二月火乃年火也惟卯酉亥三月不用火者乃火敗在卯死在酉絶在亥故也五行中之生金怕死火是也故息火以應之右第六十章玄幽遠渺隔閡相連應度育種陰陽之元寥廓恍惚莫知其端先迷失軌後爲主君無平不陂道之自然變易更盛消息相因終坤始復如循連環帝王承御千載常存玄幽遠渺隔閡相連指坎離幽遠雖不相通而實有相通之道應度謂上弦下弦之内也育種者即陰陽之元也陰之元始於離陽之元存於坎先迷者言離之陰不爲先倡故上弦先育陽之元陰之育則在下弦焉爲主君者亦男正位乎外女正位乎内也右第六十一章將欲養性延命却期審思後末當慮其先人所禀軀體本一無元精雲布因氣托初後末者即延命却期之事也先此謂人之受胎之始始於無物也及自元精一布而因氣托初則百骸九竅無不備焉還丹之法正體乎是右第六十二章陰陽爲度魂魄所居陽神日魂陰神月魄魂之與魄互爲室宅性主處内立置鄞鄂鄞鄂形貌也情主營外築垣城郭城郭完全人物乃安于斯之時情合乾坤乾動而直氣布精流坤靜而翕爲道舍廬剛施而退柔化以滋九還七返八歸六居男白女赤金火相拘則水定火五行之初上善若水清而無瑕道之形象眞一難圖變而分布各自獨居魂之與魄互爲室宅以火候言之則日魂交月魄而有進退之義以坎離言之則坎男之精氣不得乎離女之胎以養則不能成金丹以一身言之則百骸九竅六腑五藏非得乎五金之氣以爲之根本亦不能以長存是知火氣神所以爲魂而實質所係皆魄也故魂無魄則無所寓魄無魂則爲棄物矣故營於外者爲情魄之用也處於内者爲性魂之用也乾動而直氣布精流類男子之交合也坤靜而翕爲道舍廬類女子之胞胎也故剛施而退則柔化而愈滋在修煉之士九還七返八歸六居其道亦然也九還者乃三千行滿爲九年之數以象懷胎九月餘也七返者乃鉛汞龍虎血氣神也皆欲返於三田八歸者乃八百功成謂一月八兩一年九十六兩故九年積而爲八百餘兩以歸丹田也六居者乃天地之六子也始三年則育長男長女於下田中三年則育中男中女於中田末三年則育少男少女於上田也男白者坎中之金也女赤者離中之砂也則水定火即前所謂臨爐定銖兩也上善即離中之陰自道生一則爲坎中陽自坎中陽之變化則五藏六府百骸九竅莫不各有定居也右第六十三章類如雞子白黑相符縱廣一寸以爲始初四肢五藏筋骨乃俱彌歷十月脱出其胞骨弱可卷肉滑若鉛言人自受胎而至生養也縱廣一寸愚嘗讀釋難經云以同身寸爲尺與升斗之度有曰方寸爲兩則知人於胞胎之始亦自此一寸而始也前言八兩者其定於此乎右第六十四章陽燧以取火非日不生光方諸非星月安能得水漿二氣玄且遠感化尚相通何况近存身切在於心胷陰陽配日月水火爲效徵此言坎爲月而中有水也離爲日而中有火也其與陽燧取火方諸取水何異哉右第六十五章耳目口三寳固塞勿發揚眞人潜深淵浮游守規中旋曲以視聽開闔皆合同爲己之樞轄動靜不竭窮離氣内營衛坎乃不用聦兊合以不談希言順鴻濛三者既關健緩體處空房委志歸虚無無念以爲常證難以推移心專不縱横寢寐神相抱覺悟候存亡顔容浸以潤骨節益堅强排却衆陰邪然後立正陽修之不輟休庶氣雲雨行淫淫若春澤液液象解冰從頭流達足究竟復上昇往來洞無極怫怫被容中反者道之驗弱者德之柄耘鋤宿污穢細微得調暢濁者清之路昏久則昭明反者謂老翁復丁壯耆嫗成姹女也此道之驗也弱者謂自卑者人尊之自後者人先之故爲德之柄污穢者在己不善之行也細微者精微之道也濁昏者乃和光同塵埋光鏟彩之道也此皆養道於外者也自怫怫被容中以上皆養道於内者也易曰離爲目坎爲耳兊爲口三者各有神存焉既言固塞又言關健目固可瞑口固可合而耳則以兩手掩之又曰緩體處空房謂當寤寐之時則瞑目掩耳閉口囓齒使内常聞風雷之聲火氣鬨鬨然而不絶則神氣自存如是則陰邪盡却而正陽自立勤而行之則和氣流暢而養於内者如此右第六十六章世人好小術不審道淺深棄正從邪徑欲速閼不通猶盲不任杖聾者聽宫商没水捕雉兔登山索龍魚植麥欲穫黍運䂓以求方竭力勞精神終年無見功欲知服食法事約而不繁世之好善者初無大見識得一小法則喜不自勝以爲天下無能知者適所以自蔽也右第六十七章太陽流珠常欲去人卒得金華轉而相因化爲白液凝而至堅金華先唱有頃之間解化爲水馬齒闌干陽乃往和情性自然迫促時陰拘蓄禁門慈母育養孝子報恩嚴父施令教敕子孫五行錯王相據以生火性銷金金伐木榮三五與一天地至精可以口訣難以書傳太陽首也流珠肺液也黄庭經謂七液洞流衝廬間廬謂廬額之間也惟此一液易於去人蓋人皆惡之也金華者腎液也肺屬金腎屬水子母相聚馬齒闌干之言其多也陽者乃日魂也亦爲性也慈母乃坤也坤爲腹而生五藏之液故五藏之液能養其身嚴父乾也乾爲首必須五藏之液上至泥丸宫而後能化之爲金丹火性銷金者火謂離宫之液也採之必在下弦下弦象秋位在乎酉金旺之時也金伐木榮金坎宫之液也飛之則在上弦上弦象春位在乎卯木榮之時也三者心肺肝也五者脾也一者腎也欲成金丹須藉乎此故曰天地至精右第六十八章子當右轉午乃東旋卯酉界隔主客二名龍呼於虎虎吸龍精兩相飲食俱相貪便遂相銜嚥咀嚼相吞熒惑守西太白經天殺氣所臨何有不傾貍狗守䑕鳥雀畏鸇各得其功何敢有聲子坎午離右轉東行逆行也謂採藥飛金晶之事也坎居北而在下必欲右轉而上升離居南而在上必欲東行而下降卯木也龍也酉金也虎也二者所主之名雖不同然一呼一吸而二者相會交相制伏不能飛走西與太白皆金也其始也金離子胎一吸之間而熒惑得以守其金故金隨熒惑而竟經於天矣太白既經天復能制伏乎蒼龍故六十八篇内曰火性銷金金伐木榮是也故黄庭經曰出日入月呼吸存得之者皆相制伏也不服則有聲右第六十九章不得其理難以妄言竭殫家室妻子饑貧自古及今好者億人訖不諧遇希有能成廣求名藥與道乖殊如審遭逢覩其端緒以類相况揆物終始五位相得而各有合類相况也火候文武物終始也右第七十章五行相尅更爲父母母含滋液父主禀與凝精流形金石不朽審專不泄得爲成道立竿見影呼谷傳響豈不靈哉天地至象若以野葛一寸巴豆一兩入喉輙僵不得俛仰當此之時雖周文揲蓍孔子占象扁鵲操鍼巫咸扣鼓安能令蘇復起馳走五行推相制伏則不飛走不飛走故能相生且立竿必見影呼谷必傳響五行相聚而必成丹可知矣右第七十一章河上姹女靈而最神得火則飛不見埃塵鬼隱龍匿莫知所存將欲制之黄芽爲根姹女離中五華之氣也經中常言閉口者恐其散於外也此又非呼吸所求之氣也惟此氣中有眞一之水乃氣爲水母也黄芽者即坎金之所化也二者雌雄相求故不能以相捨右第七十二章物無陰陽違天背元牝雞自卵其雛不全夫何故乎配合未連三五不父剛柔離分施化之精天地自然猶火動而炎上水流而潤下非有師導使其然也資始統政不可復改觀夫雌雄交媾之時剛柔相結而不可解得其節符非有工巧以制御之若男生而伏女偃其軀禀乎胞胎受氣元初非徒生時著而見之及其死也亦復效之此非父母教令其然本在交媾定制始先男生而伏喻坎爲男必伏而收之黄庭經曰後卑是也女偃其軀喻離爲女必仰而收之黄庭經曰前昂是也如是而後得交媾之義故後七八篇曰子南午北右第七十三章坎男爲月離女爲日日以施德月以舒光月受日化體不虧傷陽失其契陰侵其明晦朔薄蝕掩冒相傾陽消其形災生男女相須含吐以滋雌雄錯雜以類相求施德舒光乃男女相須以類相求也惟日魂加月魄謂行火也至晦朔之交月魄或時掩日若到朔旦則宜施微陽勿令陰氣侵陽太甚恐有所損右第七十四章金化爲水水性周章火化爲土水不得行故男動外施女靜内藏淫度過節爲女所拘魄以鈐魂不得淫奢不寒不暑進退合時各得其和俱吐證符男動外施女靜内藏與二十二篇上德下德同意右第七十五章丹砂木精得金乃并金水合處木火爲侣四者混沌列爲龍虎龍陽數奇虎陰數偶肝青爲父肺白爲母腎黑爲子脾黄爲祖子五行始三物一家都歸戊己丹砂心中氣也肝屬木故能生火金肺液也常與肝液爲一然金本以水爲子故與之合木以火爲子故與爲侣肝爲龍三數也爲火之父肺爲虎四數也爲水之母腎爲金之子脾乃腎之祖三物者木火一也金水二也土三也一家者皆吾身之所有也離管己坎管戊功實歸之右第七十六章剛柔迭興更歷分部龍西虎東建緯卯酉刑德並會相見歡喜刑主伏殺德主生起二月榆落魁臨於卯八月麥生天罡據酉子南午北互爲綱紀一九之數終而復始含元虚危播精於子東震肝也龍也西兊肺也虎也南離心也北坎腎也當上弦之日以至十五日則飛坎宫之金自北而南當十六至下弦之日則採離宫之藥自南而北故曰子南午北然龍常隨火虎常隨水故坎離交媾而金木不得以間隔故龍交乎虎虎交乎龍遂曰龍西虎東大抵金丹專以坎金爲主復終之以含元虚危播精於子右第七十七章關關雎鳩在河之洲窈窕淑女君子好逑雄不獨處雌不孤居玄武龜蛇蟠蚪相扶以明牝牡竟當相須假使二女共室顔色甚姝令蘇秦通言張儀結媒發辯利舌奮舒美辭推心調諧合爲夫妻弊髮腐齒終不相知若藥物非種名類不同分劑參差失其紀綱雖黄帝臨爐太一執火八公擣煉淮南調合立宇崇壇玉爲階陛麟脯鳳腊托籍長跪禱祝神祇請哀諸鬼沐浴齋戒冀有所望亦猶和膠補釜以𥐼塗瘡去冷加水除熱用湯飛龜舞蛇愈見乖張自開闢以來有天地而後有陰陽有男女而後有夫婦有日月而後有魂魄有心腎而後有氣液要在上下相交雌雄相媾而後有生生不窮之理豈孤立所能獨存哉周易参同契注卷中
